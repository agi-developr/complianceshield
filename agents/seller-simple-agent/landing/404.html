<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | ComplianceShield</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0e1a; --bg-nav: rgba(10,14,26,0.8); --accent: #6366f1;
      --cyan: #22d3ee; --purple: #a855f7; --text: #f1f5f9; --muted: #94a3b8;
      --font: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1rem 2rem;
      background: var(--bg-nav); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(99,102,241,0.1); display: flex; justify-content: space-between; align-items: center;
    }
    .nav-logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1.25rem; text-decoration: none; color: var(--text); }
    .shield-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--cyan)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1rem; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-cta { padding: 0.45rem 1.15rem; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 8px; color: white !important; font-weight: 600; }
    main {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem; position: relative; overflow: hidden;
    }
    main::before {
      content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
    }
    .code-404 {
      font-size: clamp(8rem, 20vw, 14rem); font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 40%, var(--cyan) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; position: relative; z-index: 1;
      animation: pulse-glow 3s ease-in-out infinite alternate;
    }
    @keyframes pulse-glow {
      0% { filter: drop-shadow(0 0 20px rgba(99,102,241,0.3)); }
      100% { filter: drop-shadow(0 0 40px rgba(99,102,241,0.5)); }
    }
    .message { font-size: 1.5rem; color: var(--muted); margin: 1rem 0 0.5rem; position: relative; z-index: 1; }
    .sub { font-size: 1rem; color: rgba(148,163,184,0.6); margin-bottom: 2.5rem; position: relative; z-index: 1; }
    .btn-home {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.85rem 2rem;
      background: linear-gradient(135deg, var(--accent), var(--purple)); color: white;
      text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s; position: relative; z-index: 1;
      box-shadow: 0 4px 24px rgba(99,102,241,0.3);
    }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.45); }
    .btn-home svg { width: 18px; height: 18px; }
    @media (max-width: 640px) {
      .nav-links { display: none; }
      nav { justify-content: center; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/"><span class="shield-icon">&#x1F6E1;</span>ComplianceShield</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/dashboard.html">Dashboard</a></li>
      <li><a href="/payments.html">Payments</a></li>
      <li><a href="/connect.html">Connect</a></li>
      <li><a href="/api-docs.html">API Docs</a></li>
      <li><a href="/pricing.html">Pricing</a></li>
      <li><a href="/login.html" class="nav-cta">Login</a></li>
    </ul>
  </nav>
  <main>
    <div class="code-404">404</div>
    <p class="message">Page not found</p>
    <p class="sub">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn-home">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
      Go Home
    </a>
  </main>
</body>
</html>
